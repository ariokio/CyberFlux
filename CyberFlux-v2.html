// ===== LOGGING =====
function addLog(name, status, msg) {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const cls = { OK: 'ok', ERR: 'err', RETRY: 'retry' }[status] || 'wait';
    entry.innerHTML = `<span class="log-status ${cls}">[${status}]</span><span class="log-name">${name}</span><span class="log-detail">${msg}</span>`;
    logList.prepend(entry);
}

// ===== XML PARSER =====
function parseRSSXML(xmlStr, url) {
    try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlStr, 'application/xml');
        const parserErr = doc.querySelector('parsererror');
        if (parserErr) return null;

        const items = doc.querySelectorAll('item, entry');
        if (!items.length) return null;

        return Array.from(items).map(item => {
            const get = (sel) => {
                for (const s of sel.split(',')) {
                    const el = item.querySelector(s.trim());
                    if (el) return el.textContent.trim() || el.getAttribute('href') || '';
                }
                return '';
            };
            const getAttr = (sel, attr) => {
                const el = item.querySelector(sel);
                return el ? el.getAttribute(attr) || '' : '';
            };

            let link = get('link') || getAttr('link', 'href') || get('id, guid');
            let title = get('title');
            let pubDate = get('pubDate, published, updated, dc\\:date, date');
            if (!pubDate) pubDate = new Date().toISOString();

            return { title: title || '(Sans titre)', link, pubDate, rawSource: url };
        }).filter(a => a.title && a.link);
    } catch(e) { return null; }
}

function getChannelTitle(xmlStr) {
    try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlStr, 'application/xml');
        const t = doc.querySelector('channel > title, feed > title');
        return t ? t.textContent.trim() : '';
    } catch(e) { return ''; }
}

// Vérification proxy local au démarrage
let proxyAvailable = false;
async function checkProxy() {
    try {
        const res = await fetch(`${LOCAL_PROXY}/ping`, { signal: AbortSignal.timeout(3000) });
        if (res.ok) { proxyAvailable = true; return true; }
    } catch(e) {}
    proxyAvailable = false;
    return false;
}

async function fetchFeedDirect(url, sourceName) {
    const proxyUrl = PROXIES[0](url);
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        const res = await fetch(proxyUrl, { signal: controller.signal });
        clearTimeout(timeout);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const items = parseRSSXML(text, url);
        if (items && items.length > 0) {
            return { items, channelTitle: getChannelTitle(text), proxy: 0 };
        }
        return { items: [], channelTitle: '', proxy: 0 };
    } catch(e) {
        const msg = e.name === 'AbortError' ? 'Timeout 15s' : e.message;
        addLog(sourceName, 'ERR', msg);
        return null;
    }
}

}

// ===== LOAD ALL FEEDS =====
async function loadAllFeeds() {
    allArticles = [];
    sourceArticleCount = {};
    okCount = 0;
    let processed = 0;

    const allSources = [];
    for (const [cat, sources] of Object.entries(SOURCES)) {
        for (const s of sources) {
            allSources.push({ ...s, category: cat });
        }
    }

    const BATCH_SIZE = 12;
    const DELAY_BETWEEN_BATCHES = 400;

    loaderMsg.textContent = `CHARGEMENT DE ${allSources.length} FLUX EN PARALLÈLE...`;

    for (let i = 0; i < allSources.length; i += BATCH_SIZE) {
        const batch = allSources.slice(i, i + BATCH_SIZE);

        const results = await Promise.allSettled(
            batch.map(async (s) => {
                const result = await fetchFeedDirect(s.url, s.name);
                return { s, result };
            })
        );

        for (const res of results) {
            processed++;
            const pct = Math.round((processed / allSources.length) * 100);
            loaderBar.style.width = pct + '%';
            loaderPct.textContent = pct + '%';
            mainProgress.style.width = pct + '%';
            loaderPercent.textContent = pct + '% CHARGÉ';
            loaderMsg.textContent = `FLUX ${processed}/${allSources.length}`;

            if (res.status === 'fulfilled') {
                const { s, result } = res.value;
                const meta = sourceMap.get(s.url);

                if (result && result.items && result.items.length > 0) {
                    okCount++;
                    const mappedItems = result.items.map(item => ({
                        ...item,
                        source: meta ? meta.name : (result.channelTitle || s.name),
                        category: meta ? meta.category : s.category,
                        contentType: meta ? meta.type : detectType(s.url)
                    }));
                    allArticles = allArticles.concat(mappedItems);
                    sourceArticleCount[s.url] = result.items.length;
                    addLog(s.name, 'OK', `${result.items.length} items — proxy ${result.proxy + 1}`);
                } else if (result && result.items.length === 0) {
                    addLog(s.name, 'ERR', 'Flux vide ou XML invalide');
                } else {
                    addLog(s.name, 'ERR', 'Timeout ou erreur réseau');
                }
            } else {
                const s = batch[results.indexOf(res)]?.s || { name: 'Inconnu' };
                addLog(s.name || 'Inconnu', 'ERR', 'Erreur inattendue');
            }

            sbArticles.textContent = allArticles.length;
            sbOk.textContent = okCount;
            articleCount.textContent = `${allArticles.length} ARTICLES`;

            // Render incrementally every 30 articles
            if (allArticles.length % 30 === 0 || processed === allSources.length) {
                allArticles.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
                applyFilters();
                updateSidebarCounts();
            }
        }

        if (i + BATCH_SIZE < allSources.length) {
            await new Promise(r => setTimeout(r, DELAY_BETWEEN_BATCHES));
        }
    }

    // Final render
    allArticles.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
    applyFilters();
    updateSidebarCounts();
    updateTicker();

    sbSources.textContent = okCount;
    sbArticles.textContent = allArticles.length;
    loaderMsg.textContent = `CHARGEMENT TERMINÉ — ${okCount}/${allSources.length} SOURCES OK`;
    loaderSub.textContent = `${allArticles.length} articles disponibles`;

    await new Promise(r => setTimeout(r, 2500));
    loader.style.opacity = '0';
    await new Promise(r => setTimeout(r, 600));
    loader.style.display = 'none';
}

// ===== FILTERS =====
function applyFilters() {
    let filtered = [...allArticles];
    const now = new Date();

    if (currentFilter.type === 'source') {
        filtered = filtered.filter(a => a.rawSource === currentFilter.value);
    } else if (currentFilter.type === 'category') {
        filtered = filtered.filter(a => a.category === currentFilter.value);
    }

    if (currentTypeFilter !== 'all') {
        if (currentTypeFilter === 'media') filtered = filtered.filter(a => a.contentType === 'video' || a.contentType === 'podcast');
        else if (currentTypeFilter === 'social') filtered = filtered.filter(a => a.contentType === 'social');
        else if (currentTypeFilter === 'article') filtered = filtered.filter(a => a.contentType === 'article');
    }

    if (currentTimeFilter !== 'all') {
        filtered = filtered.filter(a => {
            const diff = (now - new Date(a.pubDate)) / (1000 * 60 * 60 * 24);
            if (currentTimeFilter === 'today') return diff <= 1;
            if (currentTimeFilter === 'week') return diff <= 7;
            if (currentTimeFilter === 'month') return diff <= 30;
            return true;
        });
    }

    if (currentSearch) {
        filtered = filtered.filter(a =>
            a.title.toLowerCase().includes(currentSearch) ||
            a.source.toLowerCase().includes(currentSearch)
        );
    }

    render(filtered);
    articleCount.textContent = `${filtered.length} ARTICLES (sur ${allArticles.length})`;
}

// ===== RENDER =====
function render(articles) {
    if (!articles.length) {
        grid.innerHTML = '<div class="empty-msg">AUCUN ARTICLE TROUVÉ</div>';
        return;
    }

    const frag = document.createDocumentFragment();
    for (const article of articles) {
        const date = new Date(article.pubDate);
        const timeStr = isNaN(date) ? '' : date.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' }) + ' ' + date.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
        const tags = getTags(article.title, article.contentType);
        const tagsHtml = tags.map(t => `<span class="tag ${t.type}">${t.name}</span>`).join('');

        const card = document.createElement('a');
        card.href = article.link;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.className = 'card';
        if (article.contentType === 'video' || article.contentType === 'podcast') card.classList.add('media');
        else if (article.contentType === 'social') card.classList.add('social');

        card.innerHTML = `
            <div>
                <div class="meta">
                    <span class="source">${article.source.toUpperCase()}</span>
                    <span class="time">${timeStr}</span>
                </div>
                <h2 class="card-title">${article.title}</h2>
            </div>
            <div class="card-bottom"><div class="tags">${tagsHtml}</div></div>`;
        frag.appendChild(card);
    }
    grid.innerHTML = '';
    grid.appendChild(frag);
}

function getTags(title, contentType) {
    const t = title.toLowerCase();
    const tags = [];
    if (contentType === 'video') { tags.push({ name: '▶ Vidéo', type: 'video' }); return tags; }
    if (contentType === 'podcast') { tags.push({ name: '🎙 Podcast', type: 'podcast' }); return tags; }
    if (contentType === 'social') { tags.push({ name: '◈ Social', type: 'social' }); return tags; }
    if (t.includes('ransom') || t.includes('lockbit') || t.includes('blackcat') || t.includes('rançon')) tags.push({ name: 'Ransomware', type: 'ransomware' });
    else if (t.includes('vuln') || t.includes('cve-') || t.includes('exploit') || t.includes('patch') || t.includes('faille')) tags.push({ name: 'Vuln', type: 'vuln' });
    if (t.includes('apt') || t.includes('espionnage') || t.includes('nation state')) tags.push({ name: 'APT', type: 'apt' });
    if (t.includes('france') || t.includes('anssi') || t.includes('français') || t.includes('cnil')) tags.push({ name: 'France', type: 'france' });
    if (t.includes('phishing') || t.includes('hameçon') || t.includes('spear')) tags.push({ name: 'Phishing', type: 'phishing' });
    if (t.includes('fuite') || t.includes('breach') || t.includes('leak') || t.includes('données personnelles')) tags.push({ name: 'Data Leak', type: 'data' });
    if (tags.length === 0) tags.push({ name: 'Info', type: 'general' });
    return tags;
}
